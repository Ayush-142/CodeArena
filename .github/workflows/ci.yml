name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

# Deliberately no `services:` block — CI must pass with zero infra (no Mongo/Redis/Docker/
# Gemini). Unit tests only import pure functions and mock any module with a Redis/env side
# effect at import time (see api/src/contests/rebuild.test.ts, api/src/hints/llm.test.ts); a
# test that accidentally requires real infra fails loudly here (connection refused) instead of
# silently passing. ARCHITECTURE.md §13/§14.
jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Build-time only — frontend never talks to a real backend during typecheck/build.
      NEXT_PUBLIC_API_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.11'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: |
          npx tsc -p api/tsconfig.json --noEmit
          npx tsc -p worker/tsconfig.json --noEmit
          npx tsc -p frontend/tsconfig.json

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Test
        run: npm run test --workspaces --if-present

      - name: Build
        run: npm run build --workspaces --if-present
