# Production topology for the single-VM deploy (Azure B2s, 2 vCPU / 4GB RAM — see DEPLOY.md).
# NOT a replacement for docker-compose.yml (that one stays the local dev infra-only file).
#
# Request path: browser --HTTPS--> caddy --> frontend:3000 (/) or api:3001 (/api/*, /socket.io/*).
# Only `caddy` publishes ports to the host; every other service is reachable solely on the
# internal `codearena` network. /health, /ready, /metrics are deliberately NOT routed by Caddy
# (see Caddyfile) — reachable only inside this network or via `curl localhost:PORT` on the VM
# itself, never through the public domain.
#
# mem_limits sum to ~2.87GB (2944m: mongo 512 + redis 128 + minio 512 + api 384 + worker 512 +
# frontend 384 + caddy 512), leaving ~0.9GB headroom under the 4GB box for judge-container bursts
# (the judge sandboxes worker spawns are separate, short-lived containers capped by each
# problem's own memoryLimitMb — not counted against `worker`'s own limit here) plus the OS,
# backed by the 2GB swapfile DEPLOY.md has you create as a safety net. minio's share went
# 256m -> 512m after a real incident — see its own mem_limit comment below. caddy's went
# 64m -> 512m after a second real incident: a k6 load test at 500+ concurrent VUs (mixing page
# and API traffic) OOM-killed caddy repeatedly — confirmed via `sudo journalctl -k` on the VM
# (kernel oom-killer, task=caddy, 18 kills in ~6 minutes) — because 64MB can't hold the
# TLS/HTTP-2/HTTP-3 connection state for that many concurrent clients, especially once page
# responses (much larger HTML bodies than JSON) are in the mix. See
# scripts/results/k6-ceiling-2026-07-15.txt for the full measurement.

networks:
  codearena:
    driver: bridge

volumes:
  mongo-data:
  minio-data:
  caddy-data:
  caddy-config:

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    mem_limit: 512m
    networks: [codearena]
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: codearena
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      # Tolerant settings for a burstable 2-vCPU box (raised from interval:10s/timeout:5s/
      # retries:5/start_period:20s after `up --build` starved minio's healthcheck during
      # image builds — see minio's own healthcheck comment below for the confirmed root cause).
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 128m
    networks: [codearena]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      # Same small-box tolerance as mongo/minio — see minio's healthcheck comment below.
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    restart: unless-stopped
    # Confirmed root cause (real incident on the deployed VM, not theoretical): 256m was below
    # minio's actual working set, so it was constantly evicting/refetching its own page cache
    # under cgroup memory pressure — `docker stats` showed memory pinned at the 256m limit while
    # BLOCK I/O climbed by ~186GB cumulative during a single `up --build`, saturating the
    # IOPS-capped Azure disk and starving minio's own healthcheck endpoint (curl got 0 bytes in
    # 5s, ExitCode -1), which wedged every service behind `depends_on: condition: service_healthy`.
    # 512m gives it real headroom instead of a knife's-edge limit; if this is ever downsized
    # again, watch BLOCK I/O in `docker stats` for the same climbing pattern as the tell.
    mem_limit: 512m
    command: server /data --console-address ":9001"
    networks: [codearena]
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      # start_period 30s / timeout 10s / retries 12: a busy-but-healthy minio (e.g. mid-build,
      # competing with the other services' image builds for the 2 vCPUs) must not get marked
      # dead just because one probe was slow — see the mem_limit comment above for the incident
      # this tolerance is sized against.
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    mem_limit: 384m
    networks: [codearena]
    env_file:
      - ./api/.env.production
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Not a long-running service — this entry exists only so `docker compose ... build` produces
  # the codearena-judge:12-bookworm image worker/src/sandbox.ts spawns judge sandboxes from (see
  # worker/judge/Dockerfile). The `judge-image` profile is never activated by a plain
  # `up -d`/`build`, so compose never tries to start a container for it; DEPLOY.md's build step
  # names it explicitly with `--profile judge-image build judge-image` to make sure it runs.
  judge-image:
    build:
      context: .
      dockerfile: worker/judge/Dockerfile
    image: codearena-judge:12-bookworm
    profiles: ['judge-image']

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    mem_limit: 512m
    networks: [codearena]
    env_file:
      - ./worker/.env.production
    volumes:
      # Lets dockerode talk to the HOST's Docker daemon to spawn judge sandboxes — see
      # worker/Dockerfile's comment on why this is the one container that isn't non-root.
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        # Found missing during Nakalchi's Phase 7 pass - without this, the "View full report in
        # Nakalchi" deep-link is unreachable in production no matter what any .env.production
        # file contains (see frontend/Dockerfile's comment). Public domain here (unlike
        # NAKALCHI_API_BASE_URL in api/.env.production, which now uses internal container DNS) -
        # this one is rendered as a link in the admin's own browser, not service-to-service
        # traffic, so it has to be reachable from outside the Docker network.
        NEXT_PUBLIC_NAKALCHI_WEB_URL: ${NEXT_PUBLIC_NAKALCHI_WEB_URL}
    restart: unless-stopped
    mem_limit: 384m
    networks: [codearena]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    mem_limit: 512m
    networks: [codearena]
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - api
      - frontend
